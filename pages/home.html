<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游路线助手 - 智能规划您的旅程</title>
    <link rel="stylesheet" href="../styles/Header.css">
    <link rel="stylesheet" href="../styles/Footer.css">
    <link rel="stylesheet" href="../styles/Common.css">
    <link rel="stylesheet" href="../styles/Sidebar.css">
    <script src="../scripts/config.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/components.js" defer></script>
    <script src="../scripts/sidebar.js" defer></script>
    <script src="../scripts/home.js" defer></script>
</head>
<body>
<!-- 头部导航容器 -->
<div id="header-container"></div>

<!-- 主内容区 -->
<main class="main-content">
    <div class="home">
        <!-- 英雄区域 -->
        <section class="hero">
            <div class="hero-content">
                <h1>智能旅游路线规划</h1>
                <p>根据您的偏好，为您推荐最佳旅游路线</p>
            </div>
        </section>

        <!-- 路线推荐工具 -->
        <section class="section route-planner">
            <div class="container">
                <div class="planner-form">
                    <!-- 统一表单：两行三列布局 -->
                    <div class="form-grid">
                        <div class="form-group">
                            <label>📍 出发地</label>
                            <input type="text" id="departure" placeholder="请输入出发地"/>
                        </div>
                        <div class="form-group">
                            <label>🎯 目的地</label>
                            <input type="text" id="destination" placeholder="请输入目的地"/>
                        </div>
                        <div class="form-group">
                            <label>🏷️ 兴趣标签</label>
                            <div class="multi-select" id="interests-container">
                                <div class="multi-select-trigger" onclick="toggleInterestsDropdown()">
                                    <span class="multi-select-placeholder" id="interests-display">请选择兴趣标签</span>
                                    <span class="multi-select-arrow">▼</span>
                                </div>
                                <div class="multi-select-dropdown" id="interests-dropdown">
                                    <label class="multi-select-option" data-value="photo">
                                        <input type="checkbox" value="photo" onchange="updateInterestsSelection()"/>
                                        <span>📸 拍照打卡</span>
                                    </label>
                                    <label class="multi-select-option" data-value="food">
                                        <input type="checkbox" value="food" onchange="updateInterestsSelection()"/>
                                        <span>🍜 美食探索</span>
                                    </label>
                                    <label class="multi-select-option" data-value="culture">
                                        <input type="checkbox" value="culture" onchange="updateInterestsSelection()"/>
                                        <span>🏛️ 人文历史</span>
                                    </label>
                                    <label class="multi-select-option" data-value="nature">
                                        <input type="checkbox" value="nature" onchange="updateInterestsSelection()"/>
                                        <span>🏔️ 自然风光</span>
                                    </label>
                                    <label class="multi-select-option" data-value="shopping">
                                        <input type="checkbox" value="shopping" onchange="updateInterestsSelection()"/>
                                        <span>🛍️ 购物血拼</span>
                                    </label>
                                    <label class="multi-select-option" data-value="adventure">
                                        <input type="checkbox" value="adventure" onchange="updateInterestsSelection()"/>
                                        <span>🧗 户外探险</span>
                                    </label>
                                    <label class="multi-select-option" data-value="relax">
                                        <input type="checkbox" value="relax" onchange="updateInterestsSelection()"/>
                                        <span>🏖️ 休闲度假</span>
                                    </label>
                                    <label class="multi-select-option" data-value="nightlife">
                                        <input type="checkbox" value="nightlife" onchange="updateInterestsSelection()"/>
                                        <span>🌃 夜生活</span>
                                    </label>
                                </div>
                            </div>
                            <input type="hidden" id="interests" value=""/>
                        </div>
                        <div class="form-group">
                            <label>📅 出行天数</label>
                            <select id="days">
                                <option value="">请选择天数</option>
                                <option value="1-3">1-3天（短途游）</option>
                                <option value="4-7">4-7天（一周游）</option>
                                <option value="8-15">8-15天（深度游）</option>
                                <option value="15+">15天以上（长途游）</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>⚡ 游玩强度</label>
                            <select id="intensity">
                                <option value="">请选择强度</option>
                                <option value="relaxed">休闲轻松（每天1-2个景点）</option>
                                <option value="moderate">适中节奏（每天3-4个景点）</option>
                                <option value="intensive">紧凑充实（每天5+个景点）</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>👥 同行人类型</label>
                            <select id="companion">
                                <option value="">请选择同行人类型</option>
                                <option value="solo">🧍 独自一人</option>
                                <option value="couple">💑 情侣出游</option>
                                <option value="family">👨‍👩‍👧‍👦 亲子家庭</option>
                                <option value="friends">👫 朋友结伴</option>
                                <option value="elderly">🧓 长辈同行</option>
                            </select>
                        </div>
                    </div>

                    <!-- 按钮组 -->
                    <div class="form-actions">
                        <button class="btn-save-profile" onclick="saveUserProfile()">💾 保存画像</button>
                        <button class="btn-generate" onclick="generateRoute()">🎯 生成路线建议</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 推荐路线展示 -->
        <section class="section">
            <div class="container">
                <h2 class="section-title">精选推荐路线</h2>
                <div class="routes-grid" id="routes-container">
                    <!-- 路线数据将通过 API 动态加载 -->
                    <div class="loading">正在加载路线数据...</div>
                </div>
            </div>
        </section>

        <!-- 路线规划优势 -->
        <section class="section features">
            <div class="container">
                <h2 class="section-title">为什么选择我们</h2>
                <div class="features-grid">
                    <div class="feature-item">
                        <div class="feature-icon">🎯</div>
                        <h3>智能推荐</h3>
                        <p>根据您的偏好智能匹配最佳路线</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🗺️</div>
                        <h3>详细规划</h3>
                        <p>每日行程详细安排，景点顺序优化</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">💰</div>
                        <h3>预算参考</h3>
                        <p>提供详细的预算估算，合理规划开支</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⭐</div>
                        <h3>精选路线</h3>
                        <p>实地验证的优质路线，避免踩坑</p>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- 页脚容器 -->
<div id="footer-container"></div>

</body>
</html>
