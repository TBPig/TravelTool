<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游路线助手 - 智能规划您的旅程</title>
    <link rel="stylesheet" href="../styles/Header.css">
    <link rel="stylesheet" href="../styles/Footer.css">
    <link rel="stylesheet" href="../styles/Common.css">
    <script src="../scripts/config.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/home.js" defer></script>
</head>
<body>
<!-- 头部导航 -->
<header class="header">
    <div class="header-container">
        <div class="logo">
            <a href="./home.html">
                <h1>🗺️ 旅游路线助手</h1>
            </a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="./home.html">路线推荐</a></li>
            </ul>
        </nav>
        <div class="user-actions" id="user-actions">
            <!-- 未登录状态 -->
            <a href="./login.html" class="btn-login">登录</a>
            <a href="./register.html" class="btn-register">注册</a>
        </div>
    </div>
</header>

<!-- 主内容区 -->
<main class="main-content">
    <div class="home">
        <!-- 英雄区域 -->
        <section class="hero">
            <div class="hero-content">
                <h1>智能旅游路线规划</h1>
                <p>根据您的偏好，为您推荐最佳旅游路线</p>
            </div>
        </section>

        <!-- 路线推荐工具 -->
        <section class="section route-planner">
            <div class="container">
                <div class="planner-form">
                    <div class="form-group">
                        <label>出发城市</label>
                        <input type="text" id="departure" placeholder="请输入出发城市"/>
                    </div>
                    <div class="form-group">
                        <label>目的地</label>
                        <input type="text" id="destination" placeholder="请输入目的地"/>
                    </div>
                    <div class="form-group">
                        <label>出行天数</label>
                        <select id="days">
                            <option value="">请选择天数</option>
                            <option value="1-3">1-3天</option>
                            <option value="4-7">4-7天</option>
                            <option value="8-15">8-15天</option>
                            <option value="15+">15天以上</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>旅行偏好</label>
                        <select id="preference">
                            <option value="">请选择偏好</option>
                            <option value="nature">自然风光</option>
                            <option value="culture">人文历史</option>
                            <option value="food">美食探索</option>
                            <option value="relax">休闲度假</option>
                            <option value="adventure">户外探险</option>
                        </select>
                    </div>
                    <button class="btn-generate" onclick="generateRoute()">生成路线建议</button>
                </div>
            </div>
        </section>

        <!-- 推荐路线展示 -->
        <section class="section">
            <div class="container">
                <h2 class="section-title">精选推荐路线</h2>
                <div class="routes-grid" id="routes-container">
                    <!-- 路线数据将通过 API 动态加载 -->
                    <div class="loading">正在加载路线数据...</div>
                </div>
            </div>
        </section>

        <!-- 路线规划优势 -->
        <section class="section features">
            <div class="container">
                <h2 class="section-title">为什么选择我们</h2>
                <div class="features-grid">
                    <div class="feature-item">
                        <div class="feature-icon">🎯</div>
                        <h3>智能推荐</h3>
                        <p>根据您的偏好智能匹配最佳路线</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🗺️</div>
                        <h3>详细规划</h3>
                        <p>每日行程详细安排，景点顺序优化</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">💰</div>
                        <h3>预算参考</h3>
                        <p>提供详细的预算估算，合理规划开支</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⭐</div>
                        <h3>精选路线</h3>
                        <p>实地验证的优质路线，避免踩坑</p>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- 页脚 -->
<footer class="footer">
    <div class="footer-container">
        <div class="footer-section">
            <h3>关于我们</h3>
            <p>旅游路线助手专注于为旅行者提供智能、个性化的旅游路线规划服务。</p>
        </div>
        <div class="footer-section">
            <h3>联系我们</h3>
            <p>邮箱：contact@routeguide.com</p>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 旅游路线助手. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
