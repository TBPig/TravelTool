<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游路线助手 - 智能规划您的旅程</title>
    <link rel="stylesheet" href="../styles/Header.css">
    <link rel="stylesheet" href="../styles/Footer.css">
    <link rel="stylesheet" href="../styles/Common.css">
</head>
<body>
<!-- 头部导航 -->
<header class="header">
    <div class="header-container">
        <div class="logo">
            <a href="./home.html">
                <h1>🗺️ 旅游路线助手</h1>
            </a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="./home.html">路线推荐</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- 主内容区 -->
<main class="main-content">
    <div class="home">
        <!-- 英雄区域 -->
        <section class="hero">
            <div class="hero-content">
                <h1>智能旅游路线规划</h1>
                <p>根据您的偏好，为您推荐最佳旅游路线</p>
            </div>
        </section>

        <!-- 路线推荐工具 -->
        <section class="section route-planner">
            <div class="container">
                <div class="planner-form">
                    <div class="form-group">
                        <label>出发城市</label>
                        <input type="text" id="departure" placeholder="请输入出发城市"/>
                    </div>
                    <div class="form-group">
                        <label>目的地</label>
                        <input type="text" id="destination" placeholder="请输入目的地"/>
                    </div>
                    <div class="form-group">
                        <label>出行天数</label>
                        <select id="days">
                            <option value="">请选择天数</option>
                            <option value="1-3">1-3天</option>
                            <option value="4-7">4-7天</option>
                            <option value="8-15">8-15天</option>
                            <option value="15+">15天以上</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>旅行偏好</label>
                        <select id="preference">
                            <option value="">请选择偏好</option>
                            <option value="nature">自然风光</option>
                            <option value="culture">人文历史</option>
                            <option value="food">美食探索</option>
                            <option value="relax">休闲度假</option>
                            <option value="adventure">户外探险</option>
                        </select>
                    </div>
                    <button class="btn-generate" onclick="generateRoute()">生成路线建议</button>
                </div>
            </div>
        </section>

        <!-- 推荐路线展示 -->
        <section class="section">
            <div class="container">
                <h2 class="section-title">精选推荐路线</h2>
                <div class="routes-grid" id="routes-container">
                    <!-- 路线数据将通过 API 动态加载 -->
                    <div class="loading">正在加载路线数据...</div>
                </div>
            </div>
        </section>

        <!-- 路线规划优势 -->
        <section class="section features">
            <div class="container">
                <h2 class="section-title">为什么选择我们</h2>
                <div class="features-grid">
                    <div class="feature-item">
                        <div class="feature-icon">🎯</div>
                        <h3>智能推荐</h3>
                        <p>根据您的偏好智能匹配最佳路线</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🗺️</div>
                        <h3>详细规划</h3>
                        <p>每日行程详细安排，景点顺序优化</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">💰</div>
                        <h3>预算参考</h3>
                        <p>提供详细的预算估算，合理规划开支</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⭐</div>
                        <h3>精选路线</h3>
                        <p>实地验证的优质路线，避免踩坑</p>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- 页脚 -->
<footer class="footer">
    <div class="footer-container">
        <div class="footer-section">
            <h3>关于我们</h3>
            <p>旅游路线助手专注于为旅行者提供智能、个性化的旅游路线规划服务。</p>
        </div>
        <div class="footer-section">
            <h3>联系我们</h3>
            <p>邮箱：contact@routeguide.com</p>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 旅游路线助手. All rights reserved.</p>
    </div>
</footer>

<script>
    // API 基础地址
    const API_BASE_URL = 'http://localhost:3000/api';

    // 页面加载时获取路线数据
    document.addEventListener('DOMContentLoaded', function() {
        loadRoutes();
    });

    // 获取路线列表
    async function loadRoutes() {
        try {
            const response = await fetch(`${API_BASE_URL}/routes`);
            const result = await response.json();

            if (result.success) {
                renderRoutes(result.data);
            } else {
                showError('加载路线数据失败');
            }
        } catch (error) {
            console.error('获取路线失败:', error);
            showError('无法连接到服务器，请确保后端服务已启动 (npm start)');
        }
    }

    // 渲染路线卡片
    function renderRoutes(routes) {
        const container = document.getElementById('routes-container');

        if (routes.length === 0) {
            container.innerHTML = '<div class="no-data">暂无路线数据</div>';
            return;
        }

        container.innerHTML = routes.map(route => `
            <div class="route-card">
                <img src="${route.image_url || 'https://picsum.photos/400/250?random=' + route.id}" alt="${route.title}" />
                <div class="card-content">
                    <h3>${route.title}</h3>
                    <p class="route-tags">
                        ${renderTags(route.preference)}
                    </p>
                    <p class="route-desc">${route.description}</p>
                    <div class="route-info">
                        <span>⏱️ ${route.days}天</span>
                        <span>💰 预算: ${route.budget_level}</span>
                    </div>
                    <button class="btn-explore" onclick="viewRouteDetail(${route.id})">查看详情</button>
                </div>
            </div>
        `).join('');
    }

    // 渲染标签
    function renderTags(preference) {
        if (!preference) return '';
        const tagMap = {
            'nature': '自然风光',
            'culture': '人文历史',
            'food': '美食探索',
            'relax': '休闲度假',
            'adventure': '户外探险'
        };
        return preference.split(',').map(p =>
            `<span class="tag">${tagMap[p] || p}</span>`
        ).join('');
    }

    // 显示错误信息
    function showError(message) {
        const container = document.getElementById('routes-container');
        container.innerHTML = `<div class="error-message" style="color: red; padding: 20px; text-align: center;">${message}</div>`;
    }

    // 查看路线详情
    async function viewRouteDetail(routeId) {
        try {
            const response = await fetch(`${API_BASE_URL}/routes/${routeId}`);
            const result = await response.json();

            if (result.success) {
                alert(`路线详情：

${result.data.title}
${result.data.description}

出发地：${result.data.departure_city}
目的地：${result.data.destination_city}
天数：${result.data.days}天`);
            }
        } catch (error) {
            console.error('获取路线详情失败:', error);
            alert('获取路线详情失败');
        }
    }

    // 生成路线建议
    async function generateRoute() {
        const departure = document.getElementById('departure').value;
        const destination = document.getElementById('destination').value;
        const days = document.getElementById('days').value;
        const preference = document.getElementById('preference').value;

        if (!departure || !destination || !days || !preference) {
            alert('请填写完整信息');
            return;
        }

        // 根据条件筛选路线
        try {
            const params = new URLSearchParams();
            if (departure) params.append('departure', departure);
            if (destination) params.append('destination', destination);
            if (preference) params.append('preference', preference);

            const response = await fetch(`${API_BASE_URL}/routes?${params}`);
            const result = await response.json();

            if (result.success && result.data.length > 0) {
                renderRoutes(result.data);
                alert(`为您找到 ${result.data.length} 条符合条件的路线！`);
            } else {
                alert('未找到符合条件的路线，为您显示所有推荐路线');
                loadRoutes();
            }
        } catch (error) {
            console.error('搜索路线失败:', error);
            alert(`正在为您规划从 ${departure} 到 ${destination} 的 ${days}天${getPreferenceText(preference)}路线...`);
        }
    }

    function getPreferenceText(preference) {
        const map = {
            'nature': '自然风光',
            'culture': '人文历史',
            'food': '美食探索',
            'relax': '休闲度假',
            'adventure': '户外探险'
        };
        return map[preference] || '';
    }
</script>
</body>
</html>
