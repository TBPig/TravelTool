<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 旅游路线助手</title>
    <link rel="stylesheet" href="../styles/Header.css">
    <link rel="stylesheet" href="../styles/Common.css">
    <link rel="stylesheet" href="../styles/Auth.css">
    <script src="../scripts/config.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/header.js" defer></script>
    <script src="../scripts/register.js" defer></script>
</head>
<body>
<!-- 头部导航容器 -->
<div id="header-container"></div>

<!-- 注册表单 -->
<main class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>创建账号</h1>
            <p>加入我们，开启您的旅程规划之旅</p>
        </div>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名（2-20个字符）" required>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
            </div>
            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" name="nickname" placeholder="请输入昵称（选填）">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">注册</button>
        </form>

        <div class="auth-footer">
            <p>已有账号？<a href="./login.html">立即登录</a></p>
        </div>
    </div>
</main>

</body>
</html>
