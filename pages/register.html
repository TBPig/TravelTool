<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 旅游路线助手</title>
    <link rel="stylesheet" href="../styles/Header.css">
    <link rel="stylesheet" href="../styles/Footer.css">
    <link rel="stylesheet" href="../styles/Common.css">
    <style>
        /* 注册页面专用样式 */
        .auth-container {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-box {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .form-group input::placeholder {
            color: #bfbfbf;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #1890ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background-color: #40a9ff;
        }

        .btn-submit:disabled {
            background-color: #bfbfbf;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        .auth-footer p {
            color: #666;
            font-size: 14px;
        }

        .auth-footer a {
            color: #1890ff;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background-color: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
<!-- 头部导航 -->
<header class="header">
    <div class="header-container">
        <div class="logo">
            <a href="./home.html">
                <h1>🗺️ 旅游路线助手</h1>
            </a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="./home.html">路线推荐</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- 注册表单 -->
<main class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>创建账号</h1>
            <p>加入我们，开启您的旅程规划之旅</p>
        </div>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名（2-20个字符）" required>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
            </div>
            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" name="nickname" placeholder="请输入昵称（选填）">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">注册</button>
        </form>

        <div class="auth-footer">
            <p>已有账号？<a href="./login.html">立即登录</a></p>
        </div>
    </div>
</main>

<!-- 页脚 -->
<footer class="footer">
    <div class="footer-container">
        <div class="footer-section">
            <h3>关于我们</h3>
            <p>旅游路线助手专注于为旅行者提供智能、个性化的旅游路线规划服务。</p>
        </div>
        <div class="footer-section">
            <h3>联系我们</h3>
            <p>邮箱：contact@routeguide.com</p>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 旅游路线助手. All rights reserved.</p>
    </div>
</footer>

<script>
    const API_BASE_URL = 'http://localhost:3000/api';

    // 检查是否已登录
    const token = localStorage.getItem('token');
    if (token) {
        window.location.href = './home.html';
    }

    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const nickname = document.getElementById('nickname').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');

        // 重置消息
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        // 表单验证
        if (!username || !email || !password) {
            errorMsg.textContent = '请填写所有必填项';
            errorMsg.classList.add('show');
            return;
        }

        if (username.length < 2 || username.length > 20) {
            errorMsg.textContent = '用户名长度应为2-20个字符';
            errorMsg.classList.add('show');
            return;
        }

        if (password.length < 6) {
            errorMsg.textContent = '密码长度至少为6位';
            errorMsg.classList.add('show');
            return;
        }

        if (password !== confirmPassword) {
            errorMsg.textContent = '两次输入的密码不一致';
            errorMsg.classList.add('show');
            return;
        }

        // 邮箱格式验证
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            errorMsg.textContent = '请输入有效的邮箱地址';
            errorMsg.classList.add('show');
            return;
        }

        // 禁用按钮
        submitBtn.disabled = true;
        submitBtn.textContent = '注册中...';

        try {
            const response = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    email,
                    password,
                    nickname: nickname || username
                })
            });

            const result = await response.json();

            if (result.success) {
                // 保存登录信息
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));

                successMsg.textContent = '注册成功，正在跳转...';
                successMsg.classList.add('show');

                // 跳转到首页
                setTimeout(() => {
                    window.location.href = './home.html';
                }, 1000);
            } else {
                errorMsg.textContent = result.message || '注册失败';
                errorMsg.classList.add('show');
            }
        } catch (error) {
            console.error('注册失败:', error);
            errorMsg.textContent = '网络错误，请稍后重试';
            errorMsg.classList.add('show');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '注册';
        }
    });
</script>
</body>
</html>
