<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 旅游路线助手</title>
    <link rel="stylesheet" href="../styles/Header.css">
    <link rel="stylesheet" href="../styles/Footer.css">
    <link rel="stylesheet" href="../styles/Common.css">
    <link rel="stylesheet" href="../styles/Auth.css">
    <script src="../scripts/config.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/login.js" defer></script>
</head>
<body>
<!-- 头部导航 -->
<header class="header">
    <div class="header-container">
        <div class="logo">
            <a href="./home.html">
                <h1>🗺️ 旅游路线助手</h1>
            </a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="./home.html">路线推荐</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- 登录表单 -->
<main class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>欢迎回来</h1>
            <p>登录您的账号，开启旅程规划</p>
        </div>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名/邮箱</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名或邮箱" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">登录</button>
        </form>

        <div class="auth-footer">
            <p>还没有账号？<a href="./register.html">立即注册</a></p>
        </div>
    </div>
</main>

<!-- 页脚 -->
<footer class="footer">
    <div class="footer-container">
        <div class="footer-section">
            <h3>关于我们</h3>
            <p>旅游路线助手专注于为旅行者提供智能、个性化的旅游路线规划服务。</p>
        </div>
        <div class="footer-section">
            <h3>联系我们</h3>
            <p>邮箱：contact@routeguide.com</p>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 旅游路线助手. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
